name: Check if tag/package version exists in repository

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Check if tag/package version exists in repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Resolve package metadata
        id: pkg
        run: |
          set -euo pipefail
          if [ ! -f package.json ]; then
            echo "::error::package.json not found"
            exit 1
          fi
          PACKAGE_NAME=$(node -p "require('./package.json').name" 2>/dev/null || true)
          PACKAGE_VERSION=$(node -p "require('./package.json').version" 2>/dev/null || true)
          if [ -z "$PACKAGE_NAME" ] || [ -z "$PACKAGE_VERSION" ]; then
            echo "::error::Failed to read name/version from package.json"
            exit 1
          fi
          echo "name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Check if package version exists in marketplace
        env:
          PACKAGE_NAME: ${{ steps.pkg.outputs.name }}
          PACKAGE_VERSION: ${{ steps.pkg.outputs.version }}
        run: |
          set -euo pipefail
          set +e
          RAW=$(vsce show "$PACKAGE_NAME" --json 2>/dev/null)
          RC=$?
          set -e
          if [ $RC -ne 0 ] || [ -z "$RAW" ]; then
            echo "Extension '$PACKAGE_NAME' not found on marketplace (first publish). OK."
            exit 0
          fi

          PUBLISHED=$(echo "$RAW" | jq -r '.versions[].version' 2>/dev/null || true)
          if echo "$PUBLISHED" | grep -Fxq "$PACKAGE_VERSION"; then
            echo "::error::Version $PACKAGE_VERSION already exists on marketplace"
            exit 1
          fi
          echo "Version $PACKAGE_VERSION is available to publish."
